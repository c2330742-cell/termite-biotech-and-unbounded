version: '3.8'

x-logging: &default-logging
  driver: json-file
  options:
    max-size: '10m'
    max-file: '3'

secrets:
  jwt_access_secret:
    file: ./secrets/jwt_access_secret.txt
  jwt_refresh_secret:
    file: ./secrets/jwt_refresh_secret.txt
  credential_encryption_key:
    file: ./secrets/credential_encryption_key.txt
  postgres_password:
    file: ./secrets/postgres_password.txt

services:
  postgres:
    image: postgres:15-alpine
    secrets:
      - postgres_password
    environment:
      POSTGRES_DB: chronosend
      POSTGRES_USER: chronosend
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - internal
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U chronosend -d chronosend']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    logging: *default-logging

  server:
    build:
      context: .
      dockerfile: docker/Dockerfile.server
      target: production
    secrets:
      - jwt_access_secret
      - jwt_refresh_secret
      - credential_encryption_key
      - postgres_password
    environment:
      NODE_ENV: production
      PORT: '4000'
      DATABASE_URL: postgresql://chronosend:${POSTGRES_PASSWORD:?required}@postgres:5432/chronosend
      JWT_ACCESS_SECRET_FILE: /run/secrets/jwt_access_secret
      JWT_REFRESH_SECRET_FILE: /run/secrets/jwt_refresh_secret
      CREDENTIAL_ENCRYPTION_KEY_FILE: /run/secrets/credential_encryption_key
      CORS_ORIGIN: ${CORS_ORIGIN:?required}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:4000/api/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    logging: *default-logging

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      target: production
    depends_on:
      server:
        condition: service_started
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:4000}
      VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:4000}
    ports:
      - '${WEB_PORT:-80}:80'
    networks:
      - internal
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:80/']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    logging: *default-logging

networks:
  internal:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres_data:
