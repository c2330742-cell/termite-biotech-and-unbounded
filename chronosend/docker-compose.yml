version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: chronosend
      POSTGRES_USER: chronosend
      POSTGRES_PASSWORD: chronosend
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chronosend"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: docker/Dockerfile.server
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://chronosend:chronosend@postgres:5432/chronosend
      - CORS_ORIGIN=http://localhost:5173
    ports:
      - "4000:4000"
    volumes:
      - ./apps/server:/app/apps/server
      - ./packages/shared:/app/packages/shared
    command: >
      sh -c "npm run migrate && npm run dev"

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    depends_on:
      - server
    env_file: .env
    environment:
      - VITE_API_URL=http://localhost:4000
      - VITE_WS_URL=ws://localhost:4000
    ports:
      - "5173:5173"
    volumes:
      - ./apps/web:/app/apps/web
      - ./packages/shared:/app/packages/shared
    command: npm run dev

volumes:
  postgres_data:
