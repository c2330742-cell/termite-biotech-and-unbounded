<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>You Are Invited</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #08080c;
  color: #e0e0ec;
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 2rem;
  overflow: hidden;
}

.stars {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 0;
}

.message {
  position: relative;
  z-index: 1;
  animation: fadeIn 3s ease forwards;
}

.invitation {
  font-size: clamp(1rem, 3vw, 1.4rem);
  color: #7878a0;
  font-weight: 300;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 1.5rem;
  animation: pulse 4s ease-in-out infinite;
}

.beacon {
  font-size: clamp(2rem, 6vw, 4rem);
  font-weight: 900;
  letter-spacing: -0.02em;
  line-height: 1.2;
  background: linear-gradient(135deg, #ff6b35 0%, #7c3aed 50%, #60a5fa 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 1.5rem;
}

.link {
  font-size: clamp(0.9rem, 2vw, 1.1rem);
  color: #7c3aed;
  text-decoration: none;
  border: 1px solid rgba(124,58,237,0.3);
  padding: 0.75rem 2rem;
  border-radius: 8px;
  transition: all 0.4s ease;
  display: inline-block;
  margin-top: 1rem;
  position: relative;
  z-index: 1;
}

.link:hover {
  background: rgba(124,58,237,0.1);
  border-color: #7c3aed;
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(124,58,237,0.2);
}

.glow {
  position: fixed;
  width: 600px;
  height: 600px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(124,58,237,0.08) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
  animation: drift 20s ease-in-out infinite;
}

.glow:nth-child(2) {
  top: -20%;
  right: -10%;
  animation-delay: -7s;
  background: radial-gradient(circle, rgba(255,107,53,0.06) 0%, transparent 70%);
}

.glow:nth-child(3) {
  bottom: -20%;
  left: -10%;
  animation-delay: -14s;
  background: radial-gradient(circle, rgba(96,165,250,0.06) 0%, transparent 70%);
}

@keyframes fadeIn {
  0% { opacity: 0; transform: translateY(20px); }
  100% { opacity: 1; transform: translateY(0); }
}

@keyframes pulse {
  0%, 100% { opacity: 0.6; }
  50% { opacity: 1; }
}

@keyframes drift {
  0%, 100% { transform: translate(0, 0); }
  33% { transform: translate(30px, -30px); }
  66% { transform: translate(-20px, 20px); }
}

@media (max-width: 600px) {
  body { padding: 1.5rem; }
  .glow { width: 300px; height: 300px; }
}
</style>
</head>
<body>

<div class="glow"></div>
<div class="glow"></div>
<div class="glow"></div>

<div class="message">
  <div class="invitation">✦ You are invited ✦</div>
  <div class="beacon">The beacon is lit.</div>
  <a class="link" href="https://github.com" target="_blank">Find it on GitHub →</a>
</div>

<script>
(function() {
  var c = document.createElement('canvas');
  c.className = 'stars';
  document.body.prepend(c);
  var ctx = c.getContext('2d');
  var stars = [];

  function resize() {
    c.width = window.innerWidth;
    c.height = window.innerHeight;
    init();
  }

  function init() {
    stars = [];
    var count = Math.floor((c.width * c.height) / 6000);
    for (var i = 0; i < count; i++) {
      stars.push({
        x: Math.random() * c.width,
        y: Math.random() * c.height,
        r: Math.random() * 1.5 + 0.2,
        a: Math.random() * 0.5 + 0.1,
        s: Math.random() * 0.002 + 0.001,
        p: Math.random() * Math.PI * 2
      });
    }
  }

  function draw(time) {
    ctx.clearRect(0, 0, c.width, c.height);
    for (var i = 0; i < stars.length; i++) {
      var s = stars[i];
      var flicker = 0.5 + 0.5 * Math.sin(time * s.s * 2 + s.p);
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,' + (s.a * flicker) + ')';
      ctx.fill();
    }
    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', resize);
  resize();
  requestAnimationFrame(draw);
})();
</script>

</body>
</html>
