const COLORS = { purple: '#7c3aed', orange: '#ff6b35', teal: '#10b981', pink: '#ec4899', cyan: '#06b6d4', yellow: '#eab308', red: '#ef4444' };
const COLORS_LIST = ['#7c3aed','#ff6b35','#10b981','#ec4899','#06b6d4','#eab308','#ef4444','#8b5cf6'];
const chartInstances = { c1: null, c2: null };
let sortState = { col: -1, asc: true };

function parseCSV(text) {
const lines = text.trim().split('\n');
const headers = lines[0].split(',').map(h => h.trim());
const rows = [];
for (let i = 1; i < lines.length; i++) {
const vals = lines[i].split(',').map(v => v.trim());
const row = {};
headers.forEach((h, idx) => { row[h] = vals[idx]; });
rows.push(row);
}
return { headers, rows };
}

function num(v) { const n = parseFloat(v); return isNaN(n) ? v : n; }

function linearRegression(xy) {
const n = xy.length;
let sx = 0, sy = 0, sxx = 0, sxy = 0;
xy.forEach(p => { sx += p.x; sy += p.y; sxx += p.x * p.x; sxy += p.x * p.y; });
const slope = (n * sxy - sx * sy) / (n * sxx - sx * sx);
const intercept = (sy - slope * sx) / n;
let ssr = 0, sst = 0, my = sy / n;
xy.forEach(p => { ssr += Math.pow(p.y - (slope * p.x + intercept), 2); sst += Math.pow(p.y - my, 2); });
const r2 = 1 - ssr / sst;
return { slope, intercept, r2 };
}

function mean(arr) { return arr.reduce((a, b) => a + b, 0) / arr.length; }
function std(arr) { const m = mean(arr); return Math.sqrt(arr.reduce((a, b) => a + (b - m) ** 2, 0) / arr.length); }

const chartConfig = {

function getCtx(id) { return document.getElementById(id).getContext('2d'); }

function buildCellulase(data) {
const groups = {};
data.rows.forEach(r => {
const iso = r.Isolate;
if (!groups[iso]) groups[iso] = [];
groups[iso].push(num(r.Specific_Activity_U_mg));
});
const isolates = Object.keys(groups).sort();
const means = isolates.map(iso => mean(groups[iso]));
const errs = isolates.map(iso => std(groups[iso]));
const barColors = isolates.map((_, i) => COLORS_LIST[i % COLORS_LIST.length]);

const c1 = new Chart(getCtx('chart1'), {
type: 'bar',
data: {
labels: isolates,
datasets: [{
label: 'Specific Activity (U/mg)',
data: means,
backgroundColor: barColors.map(c => c + 'cc'),
borderColor: barColors,
borderWidth: 2,
borderRadius: 4,
}]
},
options: {
...chartConfig,
plugins: { ...chartConfig.options.plugins, datalabels: { display: false } },
scales: {
x: { ...chartConfig.options.scales.x, title: { display: true, text: 'Isolate', color: '#94a3b8' } },
y: { ...chartConfig.options.scales.y, title: { display: true, text: 'Specific Activity (U/mg)', color: '#94a3b8' }, beginAtZero: true }
},
parsing: false,
},
plugins: [{
id: 'errorBars',
afterDraw(chart) {
const ctx = chart.ctx;
chart.data.datasets.forEach((ds, di) => {
const meta = chart.getDatasetMeta(di);
meta.data.forEach((bar, i) => {
const x = bar.x;
const y = bar.y;
const err = errs[i];
const base = chart.scales.y.getPixelForValue(0);
const top = chart.scales.y.getPixelForValue(means[i] + err);
const bottom = chart.scales.y.getPixelForValue(means[i] - err);
ctx.save();
ctx.strokeStyle = barColors[i];
ctx.lineWidth = 2;
ctx.beginPath();
ctx.moveTo(x, top);
ctx.lineTo(x, bottom);
ctx.moveTo(x - 4, top);
ctx.lineTo(x + 4, top);
ctx.moveTo(x - 4, bottom);
ctx.lineTo(x + 4, bottom);
ctx.stroke();
ctx.restore();
});
});
}
}]
});

const tempData = data.rows.map(r => ({ x: num(r.Temperature_C), y: num(r.Activity_U_mL), isolate: r.Isolate }));
const tempColors = {};

bioEthanol.forEach(d => {
if (!bioSets[d.strain]) bioSets[d.strain] = { label: d.strain, data: [], backgroundColor: 'transparent', borderColor: COLORS_LIST[Object.keys(bioSets).length % COLORS_LIST.length], pointBackgroundColor: COLORS_LIST[Object.keys(bioSets).length % COLORS_LIST.length] };
bioSets[d.strain].data.push({ x: d.x, y: d.y });
});

const c2 = new Chart(getCtx('chart2'), {
type: 'scatter',
data: { datasets: Object.values(bioSets) },
options: {
...chartConfig,
plugins: { ...chartConfig.options.plugins, datalabels: { display: false } },
scales: {
x: { ...chartConfig.options.scales.x, title: { display: true, text: 'Biomass (g/L)', color: '#94a3b8' } },
y: { ...chartConfig.options.scales.y, title: { display: true, text: 'Ethanol (g/L)', color: '#94a3b8' }, beginAtZero: true }
}
}
});
chartInstances.c1 = c1; chartInstances.c2 = c2;

const maxEthanol = Math.max(...data.rows.map(r => num(r.Ethanol_g_L)));
const bestStrain = Object.keys(strains).reduce((a, b) => {
const maxA = Math.max(...strains[a].map(r => num(r.Ethanol_g_L)));
const maxB = Math.max(...strains[b].map(r => num(r.Ethanol_g_L)));
return maxA > maxB ? a : b;
});
const bestData = strains[bestStrain];
const maxE = Math.max(...bestData.map(r => num(r.Ethanol_g_L)));
const maxTime = Math.max(...bestData.map(r => num(r.Time_h)));
const prod = (maxE / maxTime).toFixed(3);
return [
{ label: 'Max Ethanol', value: maxEthanol.toFixed(1) + ' g/L', cls: 'accent' },
{ label: 'Best Strain', value: bestStrain, cls: 'accent2' },
{ label: 'Max Productivity (Best)', value: prod + ' g/L/h', cls: 'success' },
{ label: 'Final pH (Best)', value: bestData[bestData.length - 1].pH, cls: '' }
];
}

function buildWaste(data) {
const groups = {};
data.rows.forEach(r => {
const key = r.Substrate + '|' + r.Pretreatment;
if (!groups[key]) groups[key] = { substrate: r.Substrate, pretreatment: r.Pretreatment, vals: [] };
groups[key].vals.push(num(r.Conversion_Percent));
});
const keys = Object.keys(groups).sort((a, b) => groups[b].substrate.localeCompare(groups[a].substrate));
const substrates = [...new Set(keys.map(k => groups[k].substrate))];
const pretreatments = [...new Set(keys.map(k => groups[k].pretreatment))];
const subLabels = substrates;

const c1 = new Chart(getCtx('chart1'), {
type: 'bar',
data: {
labels: subLabels,
datasets: pretreatments.map((pre, pi) => ({
label: pre,
data: subLabels.map(sub => {
const key = sub + '|' + pre;
return groups[key] ? mean(groups[key].vals) : 0;
}),
backgroundColor: pi === 0 ? '#7c3aed88' : '#ff6b3588',
borderColor: pi === 0 ? '#7c3aed' : '#ff6b35',
borderWidth: 2,
borderRadius: 4,
}))
},
options: {
...chartConfig,
plugins: { ...chartConfig.options.plugins, datalabels: { display: false } },
scales: {
x: { ...chartConfig.options.scales.x, title: { display: true, text: 'Substrate', color: '#94a3b8' } },
y: { ...chartConfig.options.scales.y, title: { display: true, text: 'Conversion (%)', color: '#94a3b8' }, beginAtZero: true, max: 100 }
}
}
});
chartInstances.c1 = c1;

const subConv = {};
data.rows.forEach(r => {
const sub = r.Substrate;
if (!subConv[sub]) subConv[sub] = { substrate: sub, none: [], naoh: [] };
if (r.Pretreatment === 'None') subConv[sub].none.push(num(r.Conversion_Percent));
else subConv[sub].naoh.push(num(r.Conversion_Percent));
});
const bestSub = Object.keys(subConv).reduce((a, b) => {
const mA = Math.max(...subConv[a].none.concat(subConv[a].naoh));
const mB = Math.max(...subConv[b].none.concat(subConv[b].naoh));
return mA > mB ? a : b;
});
const bestPre = 'NaOH';
const highestConv = Math.max(...data.rows.map(r => num(r.Conversion_Percent)));
const bestRow = data.rows.find(r => num(r.Conversion_Percent) === highestConv);
const convStats = [
{ label: 'Best Substrate', value: bestSub, cls: 'accent' },
{ label: 'Best Pretreatment', value: bestPre, cls: 'accent2' },
{ label: 'Highest Conversion', value: highestConv.toFixed(1) + '%', cls: 'success' },
{ label: 'Enzyme Loading', value: data.rows[0].Enzyme_FPU_g + ' FPU/g', cls: '' }
];

const bySub = {};
data.rows.forEach(r => {
if (!bySub[r.Substrate]) bySub[r.Substrate] = [];
bySub[r.Substrate].push(num(r.Glucose_g_L));
});
const subMeans = Object.keys(bySub).map(s => ({ sub: s, mean: mean(bySub[s]) })).sort((a, b) => b.mean - a.mean);

const c2 = new Chart(getCtx('chart2'), {
type: 'bar',
data: {
labels: subMeans.map(s => s.sub),
datasets: [{
label: 'Mean Glucose (g/L)',
data: subMeans.map(s => s.mean),
backgroundColor: subMeans.map((_, i) => COLORS_LIST[i % COLORS_LIST.length] + 'cc'),
borderColor: subMeans.map((_, i) => COLORS_LIST[i % COLORS_LIST.length]),
borderWidth: 2,
borderRadius: 4,
}]
},
options: {
...chartConfig,
plugins: { ...chartConfig.options.plugins, datalabels: { display: false } },
scales: {
x: { ...chartConfig.options.scales.x, title: { display: true, text: 'Substrate', color: '#94a3b8' } },
y: { ...chartConfig.options.scales.y, title: { display: true, text: 'Glucose (g/L)', color: '#94a3b8' }, beginAtZero: true }
}
}
});
chartInstances.c2 = c2;

return convStats;
}

function buildCalibration(data) {
const points = data.rows.map(r => ({ x: num(r.Glucose_mM), y: num(r.Absorbance_540nm) }));
const reg = linearRegression(points);
const maxX = Math.max(...points.map(p => p.x));
const lineData = [{ x: 0, y: reg.intercept }, { x: maxX, y: reg.slope * maxX + reg.intercept }];

const c1 = new Chart(getCtx('chart1'), {
type: 'scatter',
data: {
datasets: [{
label: 'Data',
data: points,
backgroundColor: '#7c3aedcc',
borderColor: '#7c3aed',
pointRadius: 6,
pointHoverRadius: 8,
}, {
label: 'Regression',
data: lineData,
type: 'line',
borderColor: '#ff6b35',
borderWidth: 2.5,
pointRadius: 0,
fill: false,
tension: 0,
}]
},
options: {
...chartConfig,
plugins: {
...chartConfig.options.plugins,
datalabels: { display: false },
annotation: undefined,
},
scales: {
x: { ...chartConfig.options.scales.x, title: { display: true, text: 'Glucose (mM)', color: '#94a3b8' } },
y: { ...chartConfig.options.scales.y, title: { display: true, text: 'Absorbance (540 nm)', color: '#94a3b8' }, beginAtZero: true }
}
}
});

document.getElementById('chartTitle1').textContent = 'Glucose Calibration Curve';

const glucose = data.rows.map(r => num(r.Glucose_mM));
const abs = data.rows.map(r => num(r.Absorbance_540nm));
const c2 = new Chart(getCtx('chart2'), {
type: 'scatter',
data: {
datasets: [{
label: 'Residuals',
data: points.map(p => ({ x: p.x, y: p.y - (reg.slope * p.x + reg.intercept) })),
backgroundColor: '#10b981cc',
borderColor: '#10b981',
pointRadius: 5,
pointHoverRadius: 7,
}]
},
options: {
...chartConfig,
plugins: { ...chartConfig.options.plugins, datalabels: { display: false } },
scales: {
x: { ...chartConfig.options.scales.x, title: { display: true, text: 'Glucose (mM)', color: '#94a3b8' } },
y: { ...chartConfig.options.scales.y, title: { display: true, text: 'Residual Absorbance (540 nm)', color: '#94a3b8' }, beginAtZero: true }
}
}
});
chartInstances.c1 = c1; chartInstances.c2 = c2;

document.getElementById('chartTitle2').textContent = 'Residual Plot';

const rSquaredFormatted = reg.r2.toFixed(4);
setTimeout(() => {
const ctx = document.getElementById('chart1');
const parent = ctx.parentElement;
const div = document.createElement('div');
div.style.cssText = 'position:absolute;bottom:20px;right:20px;background:rgba(14,14,22,0.9);border:1px solid #1e1e3a;border-radius:8px;padding:10px 14px;font-size:13px;color:#e2e8f0;z-index:10;pointer-events:none;';
div.innerHTML = `<span style="color:#94a3b8">y = ${reg.slope.toFixed(4)}x ${reg.intercept >= 0 ? '+' : '-'} ${Math.abs(reg.intercept).toFixed(4)}</span><br><span style="color:#7c3aed;font-weight:700">R² = ${rSquaredFormatted}</span>`;
parent.style.position = 'relative';
parent.appendChild(div);
}, 100);

return [
{ label: 'Slope', value: reg.slope.toFixed(4) + ' ΔAbs·mM⁻¹', cls: 'accent' },
{ label: 'Intercept', value: reg.intercept.toFixed(4) + ' Abs', cls: 'accent2' },
{ label: 'R²', value: rSquaredFormatted, cls: 'success' },
{ label: 'Range', value: '0–' + maxX + ' mM', cls: '' }
];
}

function buildTable(data) {
const thead = document.getElementById('tableHead');
const tbody = document.getElementById('tableBody');
const rowCount = document.getElementById('rowCount');
thead.innerHTML = '';
tbody.innerHTML = '';

const headers = data.headers;
let rows = [...data.rows];

rowCount.textContent = rows.length + ' rows';

const tr = document.createElement('tr');
headers.forEach((h, i) => {
const th = document.createElement('th');
th.textContent = h;
th.dataset.col = i;
th.innerHTML += ' <span class="sort-icon">▲</span>';
th.addEventListener('click', () => sortTable(i, headers, rows));
tr.appendChild(th);
});
thead.appendChild(tr);

function renderTable(rows) {
tbody.innerHTML = '';
rows.forEach(r => {
const tr2 = document.createElement('tr');
headers.forEach(h => {
const td = document.createElement('td');
td.textContent = r[h];
tr2.appendChild(td);
});
tbody.appendChild(tr2);
});
}
renderTable(rows);

window.__tableData = { headers, rows, renderTable };
window.__sortState = { col: -1, asc: true };

function sortTable(col, headers, rows) {
const state = window.__sortState;
const asc = state.col === col ? !state.asc : true;
state.col = col; state.asc = asc;
const h = headers[col];
rows.sort((a, b) => {
const va = num(a[h]), vb = num(b[h]);
if (typeof va === 'number' && typeof vb === 'number') return asc ? va - vb : vb - va;
return asc ? String(va).localeCompare(String(vb)) : String(vb).localeCompare(String(va));
});
renderTable(rows);
document.querySelectorAll('#tableHead th').forEach((th, i) => {
th.classList.toggle('sorted', i === col);
th.querySelector('.sort-icon').textContent = i === col ? (asc ? '▲' : '▼') : '▲';
});
}
}

function renderStats(cards) {
const container = document.getElementById('statsContainer');
container.innerHTML = '';
cards.forEach(c => {
const div = document.createElement('div');
div.className = 'stat-card';
div.innerHTML = `<div class="stat-label">${c.label}</div><div class="stat-value ${c.cls || ''}">${c.value}</div>`;
container.appendChild(div);
});
}

function destroyCharts() {
if (chartInstances.c1) { chartInstances.c1.destroy(); chartInstances.c1 = null; }
if (chartInstances.c2) { chartInstances.c2.destroy(); chartInstances.c2 = null; }
document.querySelectorAll('.chart-card .chart-wrap > div:not(canvas)').forEach(el => el.remove());
}

function loadFile(fileKey) {
document.getElementById('chartTitle1').textContent = 'Chart 1';
document.getElementById('chartTitle2').textContent = 'Chart 2';
destroyCharts();
const csv = CSV_DATA[fileKey];
const data = parseCSV(csv);
let stats;
switch (fileKey) {
case 'cellulase':
stats = buildCellulase(data);
break;
case 'fermentation':
stats = buildFermentation(data);
break;
case 'waste':
stats = buildWaste(data);
break;
case 'calibration':
stats = buildCalibration(data);
break;
}
if (stats) renderStats(stats);
buildTable(data);
}

document.addEventListener('DOMContentLoaded', () => {
console.log('✦ Data is alive. Explore the science.');
const sel = document.getElementById('fileSelect');
sel.addEventListener('change', () => loadFile(sel.value));
loadFile(sel.value);

document.getElementById('exportBtn').addEventListener('click', () => {
const targetChart = chartInstances.c1 || chartInstances.c2;
if (!targetChart) return;
const link = document.createElement('a');
link.download = 'biofuel-chart.png';
link.href = targetChart.toBase64Image('image/png', 2);
link.click();
});
});
</script>
